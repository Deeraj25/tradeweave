  <style>
    html { scroll-behavior: smooth; }
    body {
      font-family: Inter, ui-sans-serif, system-ui, sans-serif;
      background-color: #0a0a0a; color: #f5efe6; -webkit-font-smoothing: antialiased;
      background-image:
        radial-gradient(900px 500px at 85% -5%, rgba(212,165,55,.10), transparent 60%),
        radial-gradient(700px 400px at -10% 110%, rgba(212,165,55,.06), transparent 60%);
      background-attachment: fixed;
    }
    .text-display { font-family: "Playfair Display", ui-serif, Georgia, serif; }
    ::selection { background: rgba(212,165,55,.3); }
    ::-webkit-scrollbar { width: 10px; height: 10px; }
    ::-webkit-scrollbar-track { background: #0a0a0a; }
    ::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 999px; }
    ::-webkit-scrollbar-thumb:hover { background: #d4a537; }

    .btn-gold {
      display: inline-flex; align-items: center; justify-content: center; gap: .5rem;
      border-radius: .75rem; background: #d4a537; color: #0a0a0a; font-weight: 600;
      padding: 0 1.25rem; transition: all .2s;
    }
    .btn-gold:hover { background: #e6c566; }
    .btn-gold:active { transform: scale(.98); }
    .card { border-radius: 1rem; border: 1px solid #262626; background: rgba(22,22,22,.7); backdrop-filter: blur(6px); }

    .shimmer-gold {
      background: linear-gradient(90deg, #d4a537, #f5efe6, #d4a537);
      background-size: 200% 100%; -webkit-background-clip: text; background-clip: text;
      color: transparent; animation: shimmer 5s linear infinite;
    }
    @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: none; } }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideIn { from { transform: translateX(100%); } to { transform: none; } }
    @keyframes pop { from { opacity: 0; transform: scale(.96) translateY(12px); } to { opacity: 1; transform: none; } }
    .card-enter { animation: fadeUp .5s cubic-bezier(.22,1,.36,1) both; }
    .fade-in { animation: fadeIn .25s ease both; }
    .slide-in { animation: slideIn .35s cubic-bezier(.22,1,.36,1) both; }
    .pop-in { animation: pop .25s cubic-bezier(.22,1,.36,1) both; }
    .lift { transition: transform .3s cubic-bezier(.22,1,.36,1), box-shadow .3s, border-color .3s; }
    .lift:hover { transform: translateY(-6px); border-color: rgba(212,165,55,.4); box-shadow: 0 20px 60px -20px rgba(212,165,55,.35); }
    .line-clamp-5 { display: -webkit-box; -webkit-line-clamp: 5; -webkit-box-orient: vertical; overflow: hidden; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-presets="react">
    const { useState, useMemo, useEffect, useRef } = React;

    // ===== Embedded images (data URIs, injected at build time) =====
    const IMAGES = /*__IMAGES_JSON__*/null;

    // ===================== colour math =====================
    function hashString(s) { let h = 2166136261; for (let i = 0; i < s.length; i++) { h ^= s.charCodeAt(i); h = Math.imul(h, 16777619); } return h >>> 0; }
    function hexToRgb(hex) { const h = hex.replace("#", ""); const f = h.length === 3 ? h.split("").map(c => c + c).join("") : h; const n = parseInt(f, 16); return { r: (n >> 16) & 255, g: (n >> 8) & 255, b: n & 255 }; }
    function rgbToHsl({ r, g, b }) {
      const R = r / 255, G = g / 255, B = b / 255;
      const max = Math.max(R, G, B), min = Math.min(R, G, B);
      const l = (max + min) / 2; const d = max - min; let s = 0, h = 0;
      if (d !== 0) { s = d / (1 - Math.abs(2 * l - 1)); switch (max) { case R: h = ((G - B) / d) % 6; break; case G: h = (B - R) / d + 2; break; default: h = (R - G) / d + 4; } h *= 60; if (h < 0) h += 360; }
      return { h, s, l };
    }
    const lightness = (hex) => rgbToHsl(hexToRgb(hex)).l;
    function warmth(hex) { const { h, s, l } = rgbToHsl(hexToRgb(hex)); const chroma = s * (1 - Math.abs(2 * l - 1)); return Math.cos(((h - 45) * Math.PI) / 180) * chroma; }
    const NAMES = [
      ["terracotta","#c66b3d"],["rust","#a6492b"],["brick","#8c3b2b"],["camel","#c19a6b"],["gold","#d4a537"],
      ["mustard","#c9a227"],["olive","#6b7536"],["sage","#9caf88"],["forest","#2f4a33"],["emerald","#1e5c3a"],
      ["teal","#1f6f6b"],["cream","#f5efe6"],["ivory","#f3e9d2"],["chocolate","#5a3a2e"],["espresso","#3a2a22"],
      ["burgundy","#6e2230"],["plum","#5c3a5c"],["mauve","#9e7b8e"],["blush","#e6b7a9"],["stone","#b8ac9c"],
      ["navy","#1e2a4a"],["denim","#3e5c76"],["slate","#50607a"],["silver","#c4c8cc"],["ice blue","#bcd4e6"],
      ["fuchsia","#c2247f"],["charcoal","#2b2b2b"],["black","#0a0a0a"],["white","#ffffff"],
    ].map(([name, hex]) => ({ name, rgb: hexToRgb(hex) }));
    function nearestName(hex) {
      const { r, g, b } = hexToRgb(hex); let best = NAMES[0], bestD = Infinity;
      for (const c of NAMES) { const d = (c.rgb.r - r) ** 2 + (c.rgb.g - g) ** 2 + (c.rgb.b - b) ** 2; if (d < bestD) { bestD = d; best = c; } }
      return best.name;
    }

    // ===================== profile =====================
    const profile = {
      name: "Maya", initials: "M", season: "Warm Autumn", undertone: "warm", contrast: "medium",
      faceShape: "oval", hair: "deep espresso brown", skin: "warm golden-tan",
      loved: ["terracotta","olive","gold","cream","rust","camel","burgundy"],
      avoided: ["ice blue","fuchsia","silver","slate"],
      targetWarmth: 0.5, targetLightness: 0.44, targetContrast: 0.46,
    };

    // ===================== outfits =====================
    const CATEGORIES = ["All", "Casual", "Formal", "Street", "Evening"];
    const SOURCES = ["Vogue", "Pinterest", "Instagram", "Runway", "Lookbook"];
    const outfits = [
      { id:"kanjeevaram-saree", title:"Kanjeevaram in Burgundy & Gold", source:"Vogue", category:"Evening", palette:["#6e2230","#d4a537","#1f6f6b","#f5efe6"], items:[{name:"Kanjeevaram silk saree",color:"burgundy"},{name:"Temple-gold jhumkas",color:"gold"},{name:"Embroidered potli clutch",color:"teal"}] },
      { id:"royal-sherwani", title:"Ivory Sherwani, Gold Detailing", source:"Runway", category:"Formal", palette:["#f3e9d2","#d4a537","#6e2230"], items:[{name:"Raw-silk sherwani",color:"ivory"},{name:"Brocade nehru jacket",color:"gold"},{name:"Velvet mojaris",color:"burgundy"}] },
      { id:"cotton-kurta-set", title:"Sage & Cream Cotton Co-ord", source:"Pinterest", category:"Casual", palette:["#f5efe6","#9caf88","#c19a6b"], items:[{name:"Handloom cotton kurta",color:"cream"},{name:"Block-print dupatta",color:"sage"},{name:"Tan kolhapuris",color:"camel"}] },
      { id:"anarkali-gown", title:"Wine Anarkali, Floor-Sweeping", source:"Instagram", category:"Evening", palette:["#6e2230","#c19a6b","#f3e9d2"], items:[{name:"Floor-length anarkali",color:"burgundy"},{name:"Gold-dust dupatta",color:"camel"},{name:"Pearl drops",color:"ivory"}] },
      { id:"knit-sweater", title:"Camel Knit, Chocolate Layering", source:"Lookbook", category:"Casual", palette:["#c19a6b","#f5efe6","#5a3a2e"], items:[{name:"Lambswool knit",color:"camel"},{name:"Cream wide trouser",color:"cream"},{name:"Suede chelsea boots",color:"chocolate"}] },
      { id:"silk-kurta", title:"Mustard Silk Kurta, Tonal", source:"Vogue", category:"Formal", palette:["#c9a227","#f5efe6","#5a3a2e"], items:[{name:"Mustard silk kurta",color:"mustard"},{name:"Cream churidar",color:"cream"},{name:"Brown leather sandals",color:"chocolate"}] },
      { id:"linen-coord-set", title:"Stone Linen, Olive Notes", source:"Pinterest", category:"Formal", palette:["#b8ac9c","#f3e9d2","#6b7536"], items:[{name:"Linen blazer",color:"stone"},{name:"Wide linen trouser",color:"ivory"},{name:"Olive woven belt",color:"olive"}] },
      { id:"denim-jacket", title:"Denim & Rust Street Layer", source:"Instagram", category:"Street", palette:["#3e5c76","#f5efe6","#a6492b","#2b2b2b"], items:[{name:"Washed denim jacket",color:"denim"},{name:"Cream graphic tee",color:"cream"},{name:"Rust beanie",color:"rust"}] },
      { id:"salwar-kameez", title:"Teal Salwar, Gold Trim", source:"Pinterest", category:"Casual", palette:["#1f6f6b","#d4a537","#f5efe6"], items:[{name:"Teal cotton kameez",color:"teal"},{name:"Gold gota dupatta",color:"gold"},{name:"Cream juttis",color:"cream"}] },
      { id:"tailored-blazer", title:"Charcoal Blazer, Camel Base", source:"Runway", category:"Formal", palette:["#2b2b2b","#c19a6b","#f5efe6"], items:[{name:"Charcoal wool blazer",color:"charcoal"},{name:"Camel turtleneck",color:"camel"},{name:"Cream tailored trouser",color:"cream"}] },
      { id:"floral-summer-dress", title:"Blush Floral, Soft Daywear", source:"Lookbook", category:"Casual", palette:["#e6b7a9","#9caf88","#f5efe6"], items:[{name:"Blush floral midi",color:"blush"},{name:"Sage cardigan",color:"sage"},{name:"Cream espadrilles",color:"cream"}] },
      { id:"bridal-lehenga", title:"Bridal Lehenga, Deep Red & Gold", source:"Vogue", category:"Evening", palette:["#8c3b2b","#d4a537","#6e2230"], items:[{name:"Hand-embroidered lehenga",color:"brick"},{name:"Zardozi gold odhani",color:"gold"},{name:"Kundan choker",color:"burgundy"}] },
      { id:"banarasi-saree", title:"Banarasi, Emerald & Gold", source:"Runway", category:"Evening", palette:["#1e5c3a","#d4a537","#f3e9d2"], items:[{name:"Banarasi silk saree",color:"emerald"},{name:"Zari gold border",color:"gold"},{name:"Ivory silk blouse",color:"ivory"}] },
      { id:"classic-white-shirt", title:"Crisp White Shirt, Denim", source:"Pinterest", category:"Casual", palette:["#ffffff","#3e5c76","#2b2b2b"], items:[{name:"Poplin white shirt",color:"white"},{name:"Straight indigo jean",color:"denim"},{name:"Charcoal loafers",color:"charcoal"}] },
      { id:"festive-lehenga", title:"Festive Lehenga, Fuchsia Pop", source:"Instagram", category:"Evening", palette:["#c2247f","#d4a537","#f3e9d2"], items:[{name:"Georgette lehenga",color:"fuchsia"},{name:"Mirror-work blouse",color:"gold"},{name:"Ivory net dupatta",color:"ivory"}] },
      { id:"evening-gown", title:"Silver Column Evening Gown", source:"Runway", category:"Evening", palette:["#0a0a0a","#c4c8cc","#50607a"], items:[{name:"Satin column gown",color:"black"},{name:"Crystal drop earrings",color:"silver"},{name:"Slate satin clutch",color:"slate"}] },
    ];

    // ===================== engine =====================
    const clamp = (n, lo = 0, hi = 1) => Math.max(lo, Math.min(hi, n));
    function analyseOutfit(o, p) {
      const swatchNames = o.palette.map(nearestName);
      const warmths = o.palette.map(warmth);
      const lights = o.palette.map(lightness);
      const warmthAvg = warmths.reduce((a, b) => a + b, 0) / warmths.length;
      const lightAvg = lights.reduce((a, b) => a + b, 0) / lights.length;
      const contrast = Math.max(...lights) - Math.min(...lights);
      const undertoneScore = clamp(1 - Math.abs(warmthAvg - p.targetWarmth) / 1.2);
      const depthScore = clamp(1 - Math.abs(lightAvg - p.targetLightness) / 0.6);
      const contrastScore = clamp(1 - Math.abs(contrast - p.targetContrast) / 0.7);
      let pref = 0;
      for (const name of swatchNames) { if (p.loved.includes(name)) pref += 2; if (p.avoided.includes(name)) pref -= 4; }
      pref = Math.max(-10, Math.min(8, pref));
      const jitter = (hashString(o.id + "|" + p.season) % 7) - 3;
      const raw = 0.5 * undertoneScore + 0.2 * depthScore + 0.2 * contrastScore;
      const matchScore = Math.max(62, Math.min(98, Math.round(58 + raw * 40 + pref + jitter)));
      const undertoneMatch = Math.sign(warmthAvg || 0) === (p.undertone === "cool" ? -1 : 1) || p.undertone === "neutral";
      const contrastMatch = Math.abs(contrast - p.targetContrast) < 0.2;
      const seasonMatch = undertoneScore > 0.66;
      const dominant = swatchNames[0]; const accent = swatchNames[1] ?? swatchNames[0];
      return { matchScore, warmthAvg, contrast, undertoneMatch, contrastMatch, seasonMatch, swatchNames, dominant, accent,
        why: buildWhy(p, { warmthAvg, contrast, undertoneScore, contrastScore, dominant, accent }), tips: buildTips(o, p, contrast) };
    }
    function buildWhy(p, m) {
      const parts = [];
      if (m.warmthAvg > 0.15) parts.push(`The ${m.dominant} and ${m.accent} carry the same golden warmth as your ${p.skin} skin and ${p.hair} hair — pure ${p.season} territory, so the colour lifts your complexion instead of draining it.`);
      else if (m.warmthAvg < -0.15) parts.push(`These ${m.dominant} tones run cooler than your warm undertone, so keep them away from the face — anchor the look with a ${p.loved[0]} or ${p.loved[2]} layer near your collar to bridge it.`);
      else parts.push(`This near-neutral ${m.dominant} palette plays safely against your warm undertone and reads polished without competing with your ${p.hair} hair.`);
      if (m.contrastScore > 0.7) parts.push(`Its medium contrast mirrors the soft depth between your skin and hair, and the unbroken vertical line flatters your ${p.faceShape} face.`);
      else if (m.contrast > 0.6) parts.push(`The high contrast is bold for your ${p.contrast}-contrast colouring — let the lighter piece sit up top to keep it from overpowering your features.`);
      else parts.push(`The low, tonal contrast suits your ${p.contrast}-contrast colouring and keeps the eye on your ${p.faceShape} face.`);
      return parts.join(" ");
    }
    function buildTips(o, p, contrast) {
      return [
        `Build from the base up: start with the ${o.items[0].name.toLowerCase()}, then layer outward.`,
        contrast > 0.55 ? `Keep the lighter colour above the waist to draw the eye upward toward your face.` : `Define the waist with a ${p.loved[0]} belt to add structure to the tonal palette.`,
        `Repeat your ${p.season} accent — a ${p.loved[1]} or ${p.loved[3]} note in the accessories — to tie the whole look to your palette.`,
      ];
    }

    // ===================== icons =====================
    const PATHS = {
      heart: "M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.29 1.49 4.04 3 5.5l7 7Z",
      sparkles: "M9.94 14.06A2 2 0 0 0 8.5 12.6l-5.6-1.44a.5.5 0 0 1 0-.96L8.5 8.76A2 2 0 0 0 9.94 7.3l1.44-5.6a.5.5 0 0 1 .96 0l1.44 5.6A2 2 0 0 0 15.2 8.76l5.6 1.44a.5.5 0 0 1 0 .96l-5.6 1.44a2 2 0 0 0-1.44 1.46l-1.44 5.6a.5.5 0 0 1-.96 0Z",
      upload: "M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4 M17 8l-5-5-5 5 M12 3v12",
      x: "M18 6 6 18 M6 6l12 12",
      check: "M20 6 9 17l-5-5",
      sliders: "M4 21v-7 M4 10V3 M12 21v-9 M12 8V3 M20 21v-5 M20 12V3 M1 14h6 M9 8h6 M17 16h6",
      arrow: "M7 7h10v10 M7 17 17 7",
      search: "m13.5 13.5 5 5 M2 8.5l3 3 M5 8.5l-3 3 M11 8.5A5.5 5.5 0 1 1 0 8.5a5.5 5.5 0 0 1 11 0Z",
    };
    function Icon({ name, size = 18, fill = "none", className = "", strokeWidth = 2 }) {
      return (
        <svg width={size} height={size} viewBox="0 0 24 24" fill={fill} stroke="currentColor"
          strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round" className={className}>
          {PATHS[name].split(" M").map((d, i) => <path key={i} d={(i ? "M" : "") + d} />)}
        </svg>
      );
    }

    // ===================== components =====================
    function Avatar({ size = 40, className = "" }) {
      return (
        <div className={"grid shrink-0 place-items-center rounded-full font-semibold text-ink ring-2 ring-gold/70 " + className}
          style={{ width: size, height: size, fontSize: size * 0.4, background: "linear-gradient(135deg,#e6c566,#d4a537 60%,#b9842a)" }}
          title={profile.name + " · " + profile.season}>{profile.initials}</div>
      );
    }

    function Verdict({ ok, label }) {
      return (
        <span className={"inline-flex items-center gap-1 rounded-full border px-2 py-0.5 text-[11px] " +
          (ok ? "border-gold/50 bg-gold/10 text-gold" : "border-line text-cream/45")}>
          {ok ? <Icon name="check" size={11} /> : <span className="text-cream/40">~</span>}{label}
        </span>
      );
    }

    function OutfitCard({ outfit, analysis, saved, onToggleSave, onOpen, index }) {
      return (
        <article onClick={onOpen}
          className="card lift group relative cursor-pointer overflow-hidden card-enter"
          style={{ animationDelay: Math.min(index * 40, 400) + "ms" }}>
          <div className="relative overflow-hidden" style={{ aspectRatio: "3 / 4" }}>
            <img src={IMAGES[outfit.id]} alt={outfit.title} loading="lazy"
              className="h-full w-full object-cover transition-transform duration-700 ease-out group-hover:scale-105" />
            <div className="absolute inset-0" style={{ background: "linear-gradient(to top,#0a0a0a,rgba(10,10,10,.15) 55%,transparent)" }} />
            <button onClick={(e) => { e.stopPropagation(); onToggleSave(); }} aria-label={saved ? "Remove from saved" : "Save outfit"}
              className="absolute left-3 top-3 grid h-9 w-9 place-items-center rounded-full border border-white/15 bg-ink/50 backdrop-blur transition-colors hover:border-gold/60 active:scale-90">
              <Icon name="heart" size={16} fill={saved ? "#d4a537" : "none"} className={saved ? "text-gold" : "text-cream/90"} />
            </button>
            <div className="absolute right-3 top-3 inline-flex items-center gap-1 rounded-full border border-gold/40 bg-ink/55 px-2.5 py-1 text-xs font-semibold text-gold backdrop-blur">
              <Icon name="sparkles" size={12} fill="#d4a537" />{analysis.matchScore}% match
            </div>
            <div className="absolute inset-x-0 bottom-0 p-4 transition-opacity duration-300 group-hover:opacity-0">
              <p className="text-[11px] uppercase tracking-widest text-gold/80">{outfit.source}</p>
              <h3 className="text-display text-lg font-semibold leading-tight text-cream">{outfit.title}</h3>
            </div>
            <div className="absolute inset-0 flex flex-col gap-3 bg-ink/90 p-4 opacity-0 backdrop-blur-sm transition-opacity duration-300 group-hover:opacity-100">
              <div className="flex items-center gap-2">
                <Avatar size={32} />
                <div className="leading-tight">
                  <p className="text-xs font-medium text-cream">You · {profile.season}</p>
                  <p className="text-[11px] text-cream/50">{outfit.title}</p>
                </div>
              </div>
              <p className="line-clamp-5 text-[13px] leading-relaxed text-cream/80">{analysis.why}</p>
              <div className="mt-auto flex flex-wrap gap-1.5">
                <Verdict ok={analysis.undertoneMatch} label="Undertone" />
                <Verdict ok={analysis.contrastMatch} label="Contrast" />
                <Verdict ok={analysis.seasonMatch} label={profile.season} />
              </div>
              <span className="inline-flex items-center gap-1 text-xs font-medium text-gold">View styling <Icon name="arrow" size={13} /></span>
            </div>
          </div>
          <div className="flex items-center gap-2 px-3 py-3">
            {outfit.palette.map((c, i) => (
              <span key={c + i} title={analysis.swatchNames[i]} className="h-5 w-5 rounded-md border border-white/10" style={{ background: c }} />
            ))}
            <span className="ml-auto text-[11px] uppercase tracking-wider text-cream/35">{outfit.category}</span>
          </div>
        </article>
      );
    }

    function Drawer({ item, onClose }) {
      if (!item) return null;
      const { outfit, analysis } = item;
      return (
        <div className="fixed inset-0 z-50 flex justify-end fade-in" onClick={onClose}>
          <div className="absolute inset-0 bg-ink/70 backdrop-blur-sm" />
          <aside onClick={(e) => e.stopPropagation()}
            className="slide-in relative z-10 h-full w-full max-w-md overflow-y-auto border-l border-line bg-ink-soft">
            <div className="relative">
              <img src={IMAGES[outfit.id]} alt={outfit.title} className="h-72 w-full object-cover" />
              <div className="absolute inset-0" style={{ background: "linear-gradient(to top,#111,transparent 60%)" }} />
              <button onClick={onClose} aria-label="Close"
                className="absolute right-4 top-4 grid h-9 w-9 place-items-center rounded-full border border-white/15 bg-ink/60 text-cream backdrop-blur hover:border-gold/60">
                <Icon name="x" size={18} />
              </button>
              <div className="absolute bottom-4 left-5 right-5">
                <p className="text-[11px] uppercase tracking-widest text-gold/80">{outfit.source}</p>
                <h2 className="text-display text-2xl font-semibold text-cream">{outfit.title}</h2>
              </div>
            </div>
            <div className="space-y-7 p-6">
              <div className="inline-flex items-center gap-1.5 rounded-full border border-gold/40 bg-gold/10 px-3 py-1 text-sm font-semibold text-gold">
                <Icon name="sparkles" size={14} fill="#d4a537" /> {analysis.matchScore}% match for {profile.name}
              </div>
              <section>
                <h3 className="mb-2 text-xs uppercase tracking-widest text-cream/40">Why it works for you</h3>
                <p className="text-sm leading-relaxed text-cream/80">{analysis.why}</p>
              </section>
              <section>
                <h3 className="mb-2 text-xs uppercase tracking-widest text-cream/40">The pieces</h3>
                <ul className="space-y-2">
                  {outfit.items.map((p, i) => (
                    <li key={p.name} className="flex items-center gap-3 text-sm text-cream/80">
                      <span className="h-4 w-4 shrink-0 rounded-full border border-white/10" style={{ background: outfit.palette[i] ?? outfit.palette[0] }} />
                      {p.name} <span className="text-cream/40">· {p.color}</span>
                    </li>
                  ))}
                </ul>
              </section>
              <section>
                <h3 className="mb-2 text-xs uppercase tracking-widest text-cream/40">Colour palette</h3>
                <div className="flex gap-2">
                  {outfit.palette.map((c, i) => (
                    <div key={c + i} className="flex-1">
                      <div className="h-12 rounded-lg border border-white/10" style={{ background: c }} />
                      <p className="mt-1 text-center text-[10px] capitalize text-cream/50">{analysis.swatchNames[i]}</p>
                    </div>
                  ))}
                </div>
              </section>
              <section>
                <h3 className="mb-2 text-xs uppercase tracking-widest text-cream/40">How to wear it</h3>
                <ol className="space-y-2">
                  {analysis.tips.map((t, i) => (
                    <li key={i} className="flex gap-3 text-sm text-cream/80">
                      <span className="grid h-5 w-5 shrink-0 place-items-center rounded-full bg-gold/15 text-[11px] font-semibold text-gold">{i + 1}</span>{t}
                    </li>
                  ))}
                </ol>
              </section>
              <p className="border-t border-line pt-4 text-xs text-cream/40">Full outfit page — with wardrobe swaps &amp; styling variations — arrives in the next phase.</p>
            </div>
          </aside>
        </div>
      );
    }

    const TYPES = ["Top","Dress","Trouser","Outerwear","Saree","Kurta","Skirt"];
    const COLORS = ["terracotta","olive","cream","gold","camel","burgundy","teal","charcoal"];
    const FITS = ["Slim","Relaxed","Tailored","Flowy","Oversized"];
    function UploadModal({ open, onClose }) {
      const inputRef = useRef(null);
      const [items, setItems] = useState([]);
      if (!open) return null;
      const add = (files) => {
        if (!files) return;
        const tagged = Array.from(files).map((f) => {
          const h = hashString(f.name + f.size);
          return { url: URL.createObjectURL(f), type: TYPES[h % TYPES.length], color: COLORS[(h >> 3) % COLORS.length], fit: FITS[(h >> 6) % FITS.length] };
        });
        setItems((prev) => [...prev, ...tagged]);
      };
      return (
        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 fade-in" onClick={onClose}>
          <div className="absolute inset-0 bg-ink/80 backdrop-blur-sm" />
          <div onClick={(e) => e.stopPropagation()} className="card pop-in relative z-10 w-full max-w-lg p-6">
            <button onClick={onClose} aria-label="Close" className="absolute right-4 top-4 text-cream/50 hover:text-cream"><Icon name="x" size={20} /></button>
            <h3 className="text-display text-2xl font-semibold text-cream">Upload garments</h3>
            <p className="mt-1 text-sm text-cream/60">Add wardrobe pieces and we auto-tag type, colour &amp; fit, then weave them into your feed.</p>
            <input ref={inputRef} type="file" accept="image/*" multiple className="hidden" onChange={(e) => add(e.target.files)} />
            <button onClick={() => inputRef.current && inputRef.current.click()}
              onDragOver={(e) => e.preventDefault()} onDrop={(e) => { e.preventDefault(); add(e.dataTransfer.files); }}
              className="mt-5 flex w-full flex-col items-center gap-2 rounded-2xl border border-dashed border-line py-10 text-cream/60 transition-colors hover:border-gold/60 hover:text-cream">
              <Icon name="upload" size={26} className="text-gold" /><span className="text-sm">Click to choose photos, or drop them here</span>
            </button>
            {items.length > 0 && (
              <div className="mt-5 grid max-h-56 grid-cols-2 gap-3 overflow-y-auto pr-1 sm:grid-cols-3">
                {items.map((it, i) => (
                  <div key={i} className="overflow-hidden rounded-xl border border-line">
                    <img src={it.url} className="h-24 w-full object-cover" />
                    <div className="space-y-0.5 p-2 text-[11px]"><p className="truncate text-cream/80">{it.type}</p><p className="text-cream/50">{it.color} · {it.fit}</p></div>
                  </div>
                ))}
              </div>
            )}
            {items.length > 0 && <button onClick={onClose} className="btn-gold mt-5 h-11 w-full"><Icon name="check" size={16} /> Add {items.length} to wardrobe</button>}
          </div>
        </div>
      );
    }

    const SORT_LABELS = { match: "Best match", contrast: "Highest contrast", warmth: "Warmest palette", newest: "Newest" };

    function App() {
      const [category, setCategory] = useState("All");
      const [sources, setSources] = useState(new Set(SOURCES));
      const [sort, setSort] = useState("match");
      const [uploadOpen, setUploadOpen] = useState(false);
      const [detail, setDetail] = useState(null);
      const [saved, setSaved] = useState(() => { try { return new Set(JSON.parse(localStorage.getItem("aura.saved") || "[]")); } catch { return new Set(); } });
      useEffect(() => { localStorage.setItem("aura.saved", JSON.stringify([...saved])); }, [saved]);

      const scored = useMemo(() => outfits.map((outfit) => ({ outfit, analysis: analyseOutfit(outfit, profile) })), []);
      const visible = useMemo(() => {
        const order = outfits.map((o) => o.id);
        const list = scored.filter(({ outfit }) => (category === "All" || outfit.category === category) && sources.has(outfit.source));
        const sorters = {
          match: (a, b) => b.analysis.matchScore - a.analysis.matchScore,
          contrast: (a, b) => b.analysis.contrast - a.analysis.contrast,
          warmth: (a, b) => b.analysis.warmthAvg - a.analysis.warmthAvg,
          newest: (a, b) => order.indexOf(a.outfit.id) - order.indexOf(b.outfit.id),
        };
        return [...list].sort(sorters[sort]);
      }, [scored, category, sources, sort]);

      const toggleSource = (s) => setSources((prev) => { const n = new Set(prev); n.has(s) ? n.delete(s) : n.add(s); return n; });
      const toggleSave = (id) => setSaved((prev) => { const n = new Set(prev); n.has(id) ? n.delete(id) : n.add(id); return n; });

      return (
        <div className="min-h-screen">
          {/* Nav */}
          <header className="sticky top-0 z-40 border-b border-line bg-ink/75 backdrop-blur-xl">
            <div className="mx-auto flex max-w-7xl items-center justify-between gap-4 px-4 py-3 sm:px-6">
              <a href="#" className="flex items-center gap-2">
                <Icon name="sparkles" size={22} fill="#d4a537" className="text-gold" />
                <span className="text-display text-xl font-semibold tracking-wide text-cream">Aura</span>
                <span className="hidden text-xs text-cream/40 sm:inline">· outfits in your colour</span>
              </a>
              <div className="flex items-center gap-3">
                <button onClick={() => setUploadOpen(true)} className="btn-gold h-10 text-sm">
                  <Icon name="upload" size={16} /><span className="hidden sm:inline">Upload Garments</span><span className="sm:hidden">Upload</span>
                </button>
                <Avatar size={38} className="hidden sm:grid" />
              </div>
            </div>
            <nav className="mx-auto max-w-7xl px-4 sm:px-6">
              <div className="flex gap-1 overflow-x-auto pb-2">
                {CATEGORIES.map((c) => {
                  const active = c === category;
                  return (
                    <button key={c} onClick={() => setCategory(c)}
                      className={"relative whitespace-nowrap rounded-full px-4 py-1.5 text-sm transition-colors " + (active ? "text-gold" : "text-cream/60 hover:text-cream")}>
                      {active && <span className="absolute inset-0 rounded-full border border-gold/40 bg-gold/10" />}
                      <span className="relative z-10">{c}</span>
                    </button>
                  );
                })}
              </div>
            </nav>
          </header>

          {/* Hero */}
          <section className="mx-auto max-w-7xl px-4 pb-6 pt-10 sm:px-6 sm:pt-14">
            <p className="mb-3 text-xs uppercase tracking-[0.3em] text-gold/80">Personalised feed</p>
            <h1 className="text-display max-w-3xl text-4xl font-semibold leading-[1.05] text-cream sm:text-5xl md:text-6xl">
              Outfits curated for your <span className="shimmer-gold">colour &amp; structure</span>
            </h1>
            <div className="mt-5 flex items-center gap-3 text-sm text-cream/70">
              <Avatar size={34} />
              <span>Tuned to <span className="text-cream">{profile.name}'s {profile.season}</span> palette · {profile.faceShape} face · {profile.hair} hair</span>
            </div>
            <div className="mt-6 flex flex-wrap items-center gap-2">
              <span className="mr-1 text-xs uppercase tracking-widest text-cream/40">Sources</span>
              {SOURCES.map((s) => {
                const on = sources.has(s);
                return (
                  <button key={s} onClick={() => toggleSource(s)}
                    className={"rounded-full border px-3 py-1 text-sm transition-all " + (on ? "border-gold bg-gold/15 text-gold" : "border-line text-cream/50 hover:border-cream/40 hover:text-cream/80")}>{s}</button>
                );
              })}
            </div>
          </section>

          {/* Grid header */}
          <div className="mx-auto flex max-w-7xl flex-wrap items-center justify-between gap-3 px-4 pb-5 sm:px-6">
            <h2 className="text-sm text-cream/70">
              <span className="text-display text-2xl font-semibold text-gold">{visible.length}</span> {visible.length === 1 ? "outfit" : "outfits"} matched for you
            </h2>
            <div className="flex items-center gap-3">
              <span className="inline-flex items-center gap-1.5 rounded-full border border-line px-3 py-1 text-sm text-cream/70">
                <Icon name="heart" size={14} fill={saved.size ? "#d4a537" : "none"} className={saved.size ? "text-gold" : ""} />{saved.size} saved
              </span>
              <label className="flex items-center gap-2 rounded-full border border-line bg-brand-gray/60 px-3 py-1.5 text-sm text-cream/80">
                <Icon name="sliders" size={14} className="text-gold" />
                <select value={sort} onChange={(e) => setSort(e.target.value)} className="cursor-pointer bg-transparent pr-1 text-cream/90 outline-none">
                  {Object.keys(SORT_LABELS).map((s) => <option key={s} value={s} style={{ background: "#161616" }}>{SORT_LABELS[s]}</option>)}
                </select>
              </label>
            </div>
          </div>

          {/* Grid */}
          {visible.length === 0 ? (
            <div className="mx-auto flex max-w-7xl flex-col items-center gap-3 px-6 py-24 text-center text-cream/50">
              <Icon name="search" size={36} className="text-gold/60" />
              <p className="text-lg text-cream/80">No outfits match those filters</p>
              <p className="text-sm">Try turning a source back on or switching category.</p>
            </div>
          ) : (
            <div className="mx-auto grid max-w-7xl gap-5 px-4 pb-24 sm:grid-cols-2 sm:px-6 lg:grid-cols-3 xl:grid-cols-4">
              {visible.map((it, i) => (
                <OutfitCard key={it.outfit.id} outfit={it.outfit} analysis={it.analysis} index={i}
                  saved={saved.has(it.outfit.id)} onToggleSave={() => toggleSave(it.outfit.id)} onOpen={() => setDetail(it)} />
              ))}
            </div>
          )}

          <footer className="border-t border-line py-8 text-center text-xs text-cream/35">
            Aura · personalised outfit feed · deterministic colour-theory engine (AI swap-in ready)
          </footer>

          <UploadModal open={uploadOpen} onClose={() => setUploadOpen(false)} />
          <Drawer item={detail} onClose={() => setDetail(null)} />
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
